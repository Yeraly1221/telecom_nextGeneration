<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> Customer info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 300px;
        }

        .main h2 {
            color: #4caf50;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button[type="submit"] {
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="main">

    <h2>Customer Information</h2>

    <p>
        First Name: <span id="firstName"></span>
    </p>

    <p>
        Last Name: <span id="lastName"></span>
    </p>

    <p>
        Phone Number: <span id="phoneNumber"></span>
    </p>

    <p>
        Email:<span id="email"></span>
    </p>

    <p>
        Balance:<span id="balance"></span>
    </p>

</div>

<script>

    async function loadCustomer() {

        const urlParams =
            new URLSearchParams(window.location.search);

        const customerId =
            urlParams.get("customerId");

        const response = await fetch("/api/customer/registration/" + customerId, {
            method: "POST"
        });

        if (!response.ok) {
            const err = await response.text();
            alert("Failed to load customer: " + err);
            return;
        }

        const data = await response.json();

        document.getElementById("firstName").innerText =
            data.firstName;

        document.getElementById("lastName").innerText =
            data.lastName;

        document.getElementById("phoneNumber").innerText =
            data.phoneNumber;

        document.getElementById("email").innerText =
            data.email;

        document.getElementById("balance").innerText =
            data.balance;
    }

    loadCustomer();

</script>

</body>
</html>
