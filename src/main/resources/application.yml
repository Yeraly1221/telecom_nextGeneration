spring:
  profiles:
    # Default to "dev" for local runs. Override with SPRING_PROFILES_ACTIVE=prod in release.
    active: ${SPRING_PROFILES_ACTIVE:dev}

# Shared app settings (override per-profile as needed)
application:
  security:
    jwt:
      # For prod, set APPLICATION_SECURITY_JWT_SECRET_KEY (base64).
      secret-key: ${APPLICATION_SECURITY_JWT_SECRET_KEY:}
      expiration: ${APPLICATION_SECURITY_JWT_EXPIRATION:900000}

